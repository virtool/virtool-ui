name: CI

on:
    push:
        branches:
            - "main"
    pull_request:
        branches:
            - "main"

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
    REGISTRY: ghcr.io
    NODE_VERSION: 22
    PNPM_VERSION: 11.1.3

jobs:
    build:
        name: Build
        runs-on: ubuntu-24.04
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Build and Push
              uses: docker/build-push-action@v7
              with:
                  target: dist
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    check-biome:
        name: Check / Biome
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Setup
              uses: ./.github/actions/setup
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  pnpm-version: ${{ env.PNPM_VERSION }}
            - name: Run Biome
              run: pnpm check
    check-typescript:
        name: Check / Typescript
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Setup
              uses: ./.github/actions/setup
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  pnpm-version: ${{ env.PNPM_VERSION }}
            - name: tsc
              run: pnpm typecheck
    test:
        name: Test
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Setup
              uses: ./.github/actions/setup
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  pnpm-version: ${{ env.PNPM_VERSION }}
            - name: Test
              run: pnpm test
    release:
        name: Publish / Release
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        needs: [test, build]
        if: github.event_name == 'push'
        outputs:
            git-tag: ${{ steps.semantic.outputs.git-tag }}
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Setup
              uses: ./.github/actions/setup
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  pnpm-version: ${{ env.PNPM_VERSION }}
            - name: Run semantic-release
              id: semantic
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: pnpm exec semantic-release
    publish-ghcr:
        name: Publish / GHCR
        runs-on: ubuntu-24.04
        timeout-minutes: 20
        if: github.repository_owner == 'Virtool' && github.event_name == 'push' && needs.release.outputs.git-tag != ''
        needs: [release]
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  ref: ${{ needs.release.outputs.git-tag }}
            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: ${{ env.PNPM_VERSION }}
            - name: Set web app version from release tag
              run: pnpm -C apps/web version "${{ needs.release.outputs.git-tag }}" --no-git-tag-version
            - name: Login
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Extract Metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  context: git
                  images: ${{ env.REGISTRY }}/virtool/ui
            - name: Build & Push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  target: dist
                  labels: ${{ steps.meta.outputs.labels }}
