name: Setup
description: Install pnpm and Node, then install dependencies

inputs:
    node-version:
        required: true
    pnpm-version:
        required: true

runs:
    using: composite
    steps:
        - name: Setup pnpm
          uses: pnpm/action-setup@v6
          with:
              version: ${{ inputs.pnpm-version }}
        - name: Setup NodeJS
          uses: actions/setup-node@v6
          with:
              node-version: ${{ inputs.node-version }}
              cache: pnpm
        - name: Install
          shell: bash
          run: pnpm install --frozen-lockfile
