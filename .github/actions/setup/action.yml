name: Setup
description: Checkout, install pnpm and Node.js, and install dependencies.

inputs:
    node-version:
        description: Node.js version to install.
        required: true
    pnpm-version:
        description: pnpm version to install.
        required: true

runs:
    using: composite
    steps:
        - name: Checkout
          uses: actions/checkout@v7
        - name: Setup pnpm
          uses: pnpm/action-setup@v6
          with:
              version: ${{ inputs.pnpm-version }}
        - name: Setup NodeJS
          uses: actions/setup-node@v6
          with:
              node-version: ${{ inputs.node-version }}
              cache: pnpm
        - name: Install
          shell: bash
          run: pnpm install --frozen-lockfile
