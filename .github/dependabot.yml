version: 2
updates:
    - package-ecosystem: "npm"
      directories:
          - "/"
          - "/apps/web"
          - "/packages/bio"
          - "/packages/config"
          - "/packages/contracts"
          - "/packages/logger"
          - "/packages/sentry"
      schedule:
          interval: "weekly"
      open-pull-requests-limit: 10
      commit-message:
          prefix: "chore"
          include: "scope"
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "monthly"
